# Supabase CLI Project Configuration
# Inner G Complete Agency — Client Intelligence Portal
#
# Run `supabase init` and then update <project_id> below with your project ref.
#
# Local dev:
#   supabase start        (starts local Supabase stack via Docker)
#   supabase db push      (apply all migrations)
#   supabase db reset     (reset DB + re-apply all migrations + seed)
#
# Linking to production:
#   supabase link --project-ref <project-ref>
#   supabase db push --password <db-password>

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://agency.innergcomplete.com"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = false
enable_anonymous_sign_ins = false
minimum_password_length = 8

[auth.email]
enable_signup = false
enable_confirmations = true
secure_password_change = true
# GHL handles all transactional email — these values kept for local dev only
# Production: passwordreset@innergcomplete.com via GHL workflow

[edge_runtime]
enabled = true
policy = "per_worker"
inspector_port = 8083

[analytics]
enabled = false

[experimental]
orioledb_version = ""
s3_host = "env(S3_HOST)"
s3_region = "env(S3_REGION)"
s3_access_key = "env(S3_ACCESS_KEY)"
s3_secret_key = "env(S3_SECRET_KEY)"

# ─── Edge Function Configuration ─────────────────────────────────────────────
# verify_jwt = false is required for ALL functions.
#
# WHY: Supabase's platform gateway verifies JWTs using HS256.
# Supabase Auth v2 issues user session tokens signed with ES256.
# When verify_jwt = true (default), the gateway rejects valid user JWTs
# before the function code ever runs (execution_id: null in logs).
#
# Our middleware (auth.ts) handles all auth correctly via getAuthenticatedUser()
# which uses supabase.auth.getUser() — the correct way to validate ES256 tokens.
# Platform-level verification is redundant AND breaks authenticated requests.
# ─────────────────────────────────────────────────────────────────────────────

[functions.validate-invite]
verify_jwt = false

[functions.generate-invite-link]
verify_jwt = false

[functions.complete-invite]
verify_jwt = false

[functions.resolve-signal]
verify_jwt = false

[functions.process-kpi-aggregation]
verify_jwt = false

[functions.submit-growth-audit-lead]
verify_jwt = false

[functions.generate-daily-snapshot]
verify_jwt = false

[functions.generate-session-summaries]
verify_jwt = false

[functions.process-embedding-jobs]
verify_jwt = false

[functions.sync-ghl-pipeline]
verify_jwt = false

[functions.connector-sync]
verify_jwt = false

[functions.send-chat-message]
verify_jwt = false

[functions.send-agency-chat-message]
verify_jwt = false

